{% set name = "yt-astro-analysis" %}
{% set version = "1.1.4" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/yt_astro_analysis-{{ version }}.tar.gz
  sha256: 4211d2ff02e94e7b30c0bc92288c0df64bcf14374b886b2d63676d4e1030c937

build:
  # Temporary fix, see https://github.com/yt-project/yt_astro_analysis/issues/277
  script_env:
    - CFLAGS=-Wno-incompatible-pointer-types  # [linux]
  number: 0
  # Keep in sync with pyproject.toml
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - rockstar-galaxies  # [linux]
  host:
    - cython >=3.0.3
    - numpy
    - pip
    - python
    - setuptools
  run:
    - h5py >=3.1.0
    - more-itertools >=8.4
    - python
    - yt >=4.0.1
    - rockstar-galaxies  # [linux]

test:
  imports:
    - yt_astro_analysis
    - yt_astro_analysis.cosmological_observation
    - yt_astro_analysis.halo_analysis.halo_finding.rockstar.rockstar_interface  # [linux]
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/yt-project/yt_astro_analysis
  summary: yt astrophysical analysis modules extension
  dev_url: https://github.com/yt-project/yt_astro_analysis/
  license: BSD-3-Clause
  license_file: COPYING.txt

extra:
  recipe-maintainers:
    - cphyc
    - brittonsmith
